name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTPPlugin
          path: target/RTPPlugin-1.0.0.jar
